name: Android CI/CD (Build & Release)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # بررسی و ساخت خودکار گریدل در صورت عدم وجود
    - name: Check and Generate Gradle Wrapper if missing
      run: |
        if [ ! -f "gradlew" ]; then
          echo "Gradlew not found. Generating wrapper on GitHub side..."
          gradle wrapper --gradle-version 9.6.1
        else
          echo "Gradlew found."
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # کامپایل پروژه برای نسخه Release
    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace

    # نصب ابزار رسمی apksigner و ساخت کلید امضای تست و اعمال آن روی فایل خروجی
    - name: Sign APK with Testing Key
      run: |
        echo "Installing apksigner..."
        sudo apt-get update && sudo apt-get install -y apksigner

        echo "Generating temporary keystore..."
        keytool -genkey -v -keystore test.keystore -storepass android123 -alias testkey -keypass android123 -dname "CN=Android Test,O=AuraAI,C=US" -keyalg RSA -keysize 2048 -validity 10000

        echo "Signing the APK..."
        # پیدا کردن فایل خروجی غیرامضا شده و امضا کردن آن به نام app-release-signed.apk
        UNSIGNED_APK=$(ls app/build/outputs/apk/release/*-unsigned.apk)
        apksigner sign --ks test.keystore --ks-pass pass:android123 --key-pass pass:android123 --out app/build/outputs/apk/release/app-release-signed.apk "$UNSIGNED_APK"

        echo "Verification:"
        apksigner verify app/build/outputs/apk/release/app-release-signed.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aura-ai-signed-apk
        path: app/build/outputs/apk/release/app-release-signed.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: v1.0.0-${{ github.run_number }}
        name: Release v1.0.0 (Build #${{ github.run_number }})
        files: app/build/outputs/apk/release/app-release-signed.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

