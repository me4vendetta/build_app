name: Android CI/CD (Build & Release)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # بررسی و ساخت خودکار گریدل در صورت عدم وجود
    - name: Check and Generate Gradle Wrapper if missing
      run: |
        if [ ! -f "gradlew" ]; then
          echo "Gradlew not found. Generating wrapper on GitHub side..."
          gradle wrapper --gradle-version 8.4
        else
          echo "Gradlew found."
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleRelease --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aura-ai-release-apk
        path: app/build/outputs/apk/release/*.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: v1.0.0-${{ github.run_number }}
        name: Release v1.0.0 (Build #${{ github.run_number }})
        files: app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

